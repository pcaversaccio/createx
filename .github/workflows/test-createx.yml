name: đź•µď¸Źâ€Ťâ™‚ď¸Ź Test CreateX

on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        os:
          - ubuntu-latest
        go_version:
          - 1.26

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          cache: true
          run_install: |
            - args: [--prefer-offline, --frozen-lockfile]

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: nightly

      - name: Show the Foundry CI config
        run: forge config
        env:
          FOUNDRY_PROFILE: ci
          FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"

      - name: Ensure Solidity version consistency
        run: |
          set -Eeuo pipefail
          version_foundry=$(forge config --json | jq -r ".solc")
          version_hh=$(npx hardhat solc)
          if [[ $version_foundry != "0.8.23" ]] || [[ $version_foundry != $version_hh ]]; then exit 1; fi

      - name: Ensure `paris` as EVM version
        run: |
          set -Eeuo pipefail
          version_foundry=$(forge config --json | jq -r ".evm_version")
          version_hh=$(npx hardhat evm)
          if [[ $version_foundry != "paris" ]] || [[ $version_foundry != $version_hh ]]; then exit 1; fi

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go_version }}
          cache: False

      - name: Install `jd` CLI
        run: |
          set -Eeuo pipefail
          git clone https://github.com/josephburnett/jd.git
          cd jd
          git checkout e37eef06c8638ac7a223d21fe3ff14082c5c0700 # v2.5.0
          go install .
          cd ..
          rm -rf jd

      - name: Ensure correctness of the `ICreateX` interface
        run: |
          set -Eeuo pipefail
          pnpm abi
          diff=$(jd -set abis/src/CreateX.sol/CreateX.json abis/src/ICreateX.sol/ICreateX.json)
          if [[ -n $diff ]]; then exit 1; fi

      - name: Foundry tests
        run: pnpm test
        env:
          FOUNDRY_PROFILE: ci
          FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"

      - name: Show the Foundry default config
        run: forge config
        env:
          FOUNDRY_PROFILE: default
          FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"

      - name: Run snapshot
        run: NO_COLOR=1 forge snapshot >> $GITHUB_STEP_SUMMARY
        env:
          FOUNDRY_PROFILE: default
          FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"

      - name: Slither static analyser
        uses: crytic/slither-action@b52cc1cbfee9ca3e8722dd5224299d16c9a6b80f # v0.4.2
        id: slither
        with:
          fail-on: config
          sarif: results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}

  coverage:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: nightly

      - name: Show the Foundry default config
        run: forge config
        env:
          FOUNDRY_PROFILE: default
          FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"

      - name: Set up LCOV
        uses: hrishikesh-kadam/setup-lcov@6c1aa0cc9e1c02f9f58f01ac599f1064ccc83470 # v1.1.0
        with:
          ref: v2.4

      - name: Run coverage
        run: |
          set -Eeuo pipefail
          echo '```' >> $GITHUB_STEP_SUMMARY
          NO_COLOR=1 forge coverage --report summary --report lcov --lcov-version 2.4 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          FOUNDRY_PROFILE: default
          FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"

      # See https://github.com/ScopeLift/foundry-template/blob/fd3875d2e99a65dec19431723d6516b4ed76746e/.github/workflows/ci.yml#L49-L78.
      - name: Remove unnecessary `test` directory
        run: lcov --branch-coverage --remove lcov.info 'test/*' --output-file lcov.info --ignore-errors inconsistent,inconsistent

      - name: Post coverage report
        # See https://github.com/orgs/community/discussions/26829#discussioncomment-3253575.
        if: ${{ (github.event.pull_request.head.repo.full_name == github.repository && github.event_name == 'pull_request') }}
        uses: romeovs/lcov-reporter-action@87a815f34ec27a5826abba44ce09bbc688da58fd # v0.4.0
        with:
          title: "`CreateX` Test Coverage Report"
          delete-old-comments: true
          lcov-file: ./lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # The following steps act as a temporary workaround, as LCOV `2.4` is not yet supported
      # in `zgosalvez/github-actions-report-lcov@v7`: https://github.com/zgosalvez/github-actions-report-lcov/issues/168.
      - name: Set up LCOV `1.16`
        run: |
          set -Eeuo pipefail
          wget -q https://github.com/linux-test-project/lcov/releases/download/v1.16/lcov-1.16.tar.gz
          echo "987031ad5528c8a746d4b52b380bc1bffe412de1f2b9c2ba5224995668e3240b lcov-1.16.tar.gz" | sha256sum -c -
          tar -xzf lcov-1.16.tar.gz
          sudo make -C lcov-1.16 install
          lcov --version
          rm -rf lcov-1.16.tar.gz lcov-1.16

      - name: Run coverage using LCOV `1.16`
        run: forge coverage --report lcov --lcov-version 1.16
        env:
          FOUNDRY_PROFILE: default
          FOUNDRY_DISABLE_NIGHTLY_WARNING: "1"

      # See https://github.com/ScopeLift/foundry-template/blob/fd3875d2e99a65dec19431723d6516b4ed76746e/.github/workflows/ci.yml#L49-L78.
      - name: Remove unnecessary `test` directory
        run: lcov --remove lcov.info 'test/*' --output-file lcov.info --rc lcov_branch_coverage=1

      - name: Verify minimum coverage
        uses: zgosalvez/github-actions-report-lcov@0e97540271bfaece1ddff20e7fa8d9a6ab1abf67 # v7.1.0
        with:
          coverage-files: ./lcov.info
          minimum-coverage: 100
